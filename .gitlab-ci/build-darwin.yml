darwin-self-contained:
  stage: build
  image: macos:sonoma-gr-build
  tags:
  - utm
  script:
  - |-
    is_in_array () {
      local elem array_elem

      elem="$1"
      shift

      for array_elem in "$@"; do
          [[ "${elem}" == "${array_elem}" ]] && return 0
      done

      return 1
    }

    list_rpaths () {
      local binary

      binary="$1"
      otool -l "${binary}" | grep -A 2 "LC_RPATH" | awk '$1 == "path" { print $2 }' | sort -u || true
    }

    list_dependent_gr_libs () {
      local binary library

      binary="$1"
      while read -r library; do
        [[ -f "$(dirname "${binary}")/../../../../lib/${library}" ]] || continue
        echo "${library}"
      done < <(otool -L "${binary}" | awk '$1 ~ /^@rpath\// { print substr($1, 8) }')
    }

    list_dependent_qt_frameworks () {
      local binary

      binary="$1"
      otool -L "$1" | tr '/' '\n' | grep -E 'Qt.*\.framework' | cut -d. -f1 || true
    }

    list_dependency () {
      local binary dependency

      binary="$1"
      dependency="$2"
      otool -L "${binary}" | grep "${dependency}" | awk 'NR == 1 { print $1 }' || true
    }

    relpath () {
        local path relative_to

        path="$1"
        relative_to="$2"

        python3 -c "import os; print(os.path.relpath('${path}', '${relative_to}'))"
    }

    create_artifacts_directory () (
      local qt6_dir

      qt6_dir="/usr/local/qt6"

      scan_needed_qt_frameworks () {
        local binaries_to_scan binary

        echo "Scanning for needed Qt frameworks..."

        needed_qt_frameworks=()
        binaries_to_scan=(
          "${qt6_dir}/plugins/platforms/libqcocoa.dylib"
          "${qt6_dir}/plugins/styles/libqmacstyle.dylib"
          "install/usr/local/gr/Applications/gksqt.app/Contents/MacOS/gksqt"
          "install/usr/local/gr/Applications/grplot.app/Contents/MacOS/grplot"
        )
        for binary in install/usr/local/gr/lib/*.{dylib,so}; do
          binaries_to_scan+=( "${binary}" )
        done

        while (( ${#binaries_to_scan[@]} > 0 )); do
          binary="${binaries_to_scan[0]}"
          binaries_to_scan=( "${binaries_to_scan[@]:1}" )
          while read -r qt_framework; do
            if ! is_in_array "${qt_framework}" "${needed_qt_frameworks[@]}"; then
              needed_qt_frameworks+=( "${qt_framework}" )
              binaries_to_scan+=( "/usr/local/qt6/lib/${qt_framework}.framework/${qt_framework}" )
            fi
          done < <(list_dependent_qt_frameworks "${binary}")
        done
      }

      move_files_into_place () {
        echo "Moving all files into place..."

        mv ./install/usr/local/gr ./artifacts

        mkdir -p "artifacts/qt6/lib"
        mkdir -p "artifacts/qt6/plugins/platforms"
        mkdir -p "artifacts/qt6/plugins/styles"

        cp "${qt6_dir}/plugins/platforms/libqcocoa.dylib" "artifacts/qt6/plugins/platforms/"
        cp "${qt6_dir}/plugins/styles/libqmacstyle.dylib" "artifacts/qt6/plugins/styles/"

        for qt_framework in "${needed_qt_frameworks[@]}"; do
          rsync \
            -a \
            --exclude Headers \
            --exclude *_debug* \
            "/usr/local/qt6/lib/${qt_framework}.framework" \
            "artifacts/qt6/lib/"
        done
      }

      delete_rpaths () {
        local binaries binary

        echo "Deleting rpaths..."

        binaries=(
          "artifacts/Applications/gksqt.app/Contents/MacOS/gksqt"
          "artifacts/Applications/grplot.app/Contents/MacOS/grplot"
        )
        for binary in artifacts/lib/*.dylib; do
          binaries+=( "${binary}" )
        done

        for binary in "${binaries[@]}"; do
          while read -r rpath; do
            printf "  Deleting rpath \"%s\" from binary \"%s\"\n" "${rpath}" "${binary}"
            install_name_tool -delete_rpath "${rpath}" "${binary}"
          done < <(list_rpaths "${binary}")
        done
      }

      add_rpath () {
        local rpath binaries binary

        rpath="@loader_path"

        echo "Add \`${rpath}\` to rpaths..."

        for binary in artifacts/lib/*.dylib; do
          printf "  Add rpath \"%s\" to binary \"%s\"\n" "${rpath}" "${binary}"
          install_name_tool -add_rpath "${rpath}" "${binary}"
        done
      }

      patch_gr_lib_paths () {
        local app binary dependency altered_dependency

        echo "Patching GR library paths..."

        for app in gksqt.app grplot.app; do
          binary="artifacts/Applications/${app}/Contents/MacOS/${app%.*}"
          while read -r gr_library; do
            dependency="$(list_dependency "${binary}" "${gr_library}")"
            [[ -n "${dependency}" ]] || continue
            altered_dependency="@loader_path/../../../../lib/${gr_library}"
            printf "  Changing dependency of binary \"%s\":\n\t\"%s\"\n\t->\n\t\"%s\"\n" \
              "${binary}" \
              "${dependency}" \
              "${altered_dependency}"
            install_name_tool \
              -change "${dependency}" \
              "${altered_dependency}" \
              "${binary}"
          done < <(list_dependent_gr_libs "${binary}")
        done
      }

      patch_qt_framework_paths () {
        local binaries qt_framework binary dependency relative_qt_lib_path altered_dependency

        echo "Patching Qt framework paths..."

        binaries=(
          "artifacts/Applications/gksqt.app/Contents/MacOS/gksqt"
          "artifacts/Applications/grplot.app/Contents/MacOS/grplot"
        )
        for binary in artifacts/lib/*.{dylib,so}; do
          binaries+=( "${binary}" )
        done

        for qt_framework in "${needed_qt_frameworks[@]}"; do
          for binary in "${binaries[@]}"; do
            dependency="$(list_dependency "${binary}" "${qt_framework}")"
            [[ -n "${dependency}" ]] || continue
            relative_qt_lib_path="$(relpath "artifacts/qt6/lib" "$(dirname "${binary}")")"
            altered_dependency="@loader_path/${relative_qt_lib_path}/${qt_framework}.framework/Versions/Current/${qt_framework}"
            printf "  Changing dependency of binary \"%s\":\n\t\"%s\"\n\t->\n\t\"%s\"\n" \
              "${binary}" \
              "${dependency}" \
              "${altered_dependency}"
            install_name_tool \
              -change "${dependency}" \
              "${altered_dependency}" \
              "${binary}"
          done
        done
      }

      scan_needed_qt_frameworks
      move_files_into_place
      delete_rpaths
      add_rpath
      patch_gr_lib_paths
      patch_qt_framework_paths
    )

    merge_artifacts () (
      needs_merge () {
        local filepath file_cmd_output

        filepath="$1"
        file_cmd_output="$(file -b "${filepath}" | head -1)"
        if [[ "${file_cmd_output}" =~ (Mach-O.*(shared library|executable))|ar\ archive ]]; then
          [[ ! "${file_cmd_output}" =~ universal\ binary ]]
          return
        fi

        return 1
      }

      create_directory_preserved () {
        local original_dir new_dir owner group mode

        original_dir="$1"
        new_dir="$2"

        owner=$(stat -f "%Su" "${original_dir}")
        group=$(stat -f "%Sg" "${original_dir}")
        mode=$(stat -f "%A" "${original_dir}")

        install -d -m "${mode}" -o "${owner}" -g "${group}" "${new_dir}"
      }

      merge_directories () {
        local src_a src_b dest filepath dirpath

        src_a="$1"
        src_b="$2"
        dest="$3"

        echo "Create directory \"${dest}\" (apply ownership and mode from \"${src_a}\")"
        create_directory_preserved "${src_a}" "${dest}"
        while IFS= read -r filepath; do
          filepath="${filepath#./}"
          if needs_merge "${src_a}/${filepath}"; then
            echo "Merge \"${src_a}/${filepath}\" and \"${src_b}/${filepath}\" -> \"${dest}/${filepath}\""
            lipo -create "${src_a}/${filepath}" "${src_b}/${filepath}" -output "${dest}/${filepath}"
          else
            echo "Copy file \"${src_a}/${filepath}\" -> \"${dest}/${filepath}\""
            cp -a "${src_a}/${filepath}" "${dest}/${filepath}"
          fi
        done < <(cd "${src_a}" && find . -mindepth 1 -maxdepth 1 -type f)
        while IFS= read -r filepath; do
          filepath="${filepath#./}"
          echo "Copy symlink \"${src_a}/${filepath}\" -> \"${dest}/${filepath}\""
          cp -a "${src_a}/${filepath}" "${dest}/${filepath}"
        done < <(cd "${src_a}" && find . -mindepth 1 -maxdepth 1 -type l)
        while IFS= read -r dirpath; do
          dirpath="${dirpath#./}"
          merge_directories "${src_a}/${dirpath}" "${src_b}/${dirpath}" "${dest}/${dirpath}"
        done < <(cd "${src_a}" && find . -mindepth 1 -maxdepth 1 -type d)
      }

      merge_directories "$@"
    )
  - export MACOSX_DEPLOYMENT_TARGET=10.15
  - make -C 3rdparty default extras
  - cmake
      -S .
      -B build
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=/usr/local/gr
      -DGR_USE_BUNDLED_LIBRARIES=ON
  - cmake --build build
  - cmake --install build --prefix "${CI_PROJECT_DIR}/install/usr/local/gr"
  - create_artifacts_directory
  - mv artifacts artifacts-darwin-aarch64
  - git clean -fdx --exclude=artifacts-darwin-aarch64
  - export MACOSX_DEPLOYMENT_TARGET=11.0
  - make -C 3rdparty default extras
      ARCHS="-arch x86_64"
      CC="cc -arch x86_64"
      CXX="c++ -arch x86_64"
      CAIRO_EXTRA_CONFIGURE_FLAGS="--host=x86_64-apple-darwin"
      FFMPEG_EXTRA_CONFIGURE_FLAGS="--arch=x86_64 --cc=\"cc -arch x86_64\" --cxx=\"c++ -arch x86_64\" --enable-cross-compile"
      GLFW_EXTRA_CMAKE_FLAGS="-DCMAKE_OSX_ARCHITECTURES=x86_64"
      OGG_EXTRA_CONFIGURE_FLAGS="--host=x86_64-apple-darwin"
      OPENH264_EXTRA_MAKE_FLAGS="ARCH=x86_64"
      PIXMAN_EXTRA_CONFIGURE_FLAGS="--host=x86_64-apple-darwin"
      THEORA_EXTRA_CONFIGURE_FLAGS="--host=x86_64-apple-darwin --disable-asm"
      TIFF_EXTRA_CONFIGURE_FLAGS="--host=x86_64-apple-darwin"
      XERCES_C_EXTRA_CMAKE_FLAGS="-DCMAKE_OSX_ARCHITECTURES=x86_64"
      ZEROMQ_EXTRA_CONFIGURE_FLAGS="--host=x86_64-apple-darwin"
  - cmake
      -S .
      -B build
      -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=/usr/local/gr
      -DGR_USE_BUNDLED_LIBRARIES=ON
      -DCMAKE_TOOLCHAIN_FILE="cmake/x86_64-darwin-clang.cmake"
      -DGR_HOST_DIRECTORY="${CI_PROJECT_DIR}/artifacts-darwin-aarch64"
  - cmake --build build
  - cmake --install build --prefix "${CI_PROJECT_DIR}/install/usr/local/gr"
  - create_artifacts_directory
  - mv artifacts artifacts-darwin-x86_64
  - merge_artifacts artifacts-darwin-aarch64 artifacts-darwin-x86_64 artifacts-darwin-universal
  artifacts:
    expire_in: 1 week
    paths:
    - artifacts-darwin-aarch64/
    - artifacts-darwin-universal/
    - artifacts-darwin-x86_64/
